<style>
:root{
  --navy:#3a4861; --navy-soft:#5a6a86; --navy-bg:#eef1f6;
  --olive:#6b7355; --olive-bg:#f0f1ea;
  --violet:#8a7aa6; --violet-bg:#f2eef6;
  --rose:#a86f7d; --rose-bg:#f6eef0;
  --ink:#2b2b2f; --ink2:#54545c; --line:#e6e0d6; --paper:#fbf9f5;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;}
.wrap{max-width:820px;margin:0 auto;padding:30px 26px 80px;}

/* cover */
.cover{text-align:center;padding:14px 0 22px;border-bottom:1.5px solid var(--line);}
.cover .tag{font-size:12px;letter-spacing:.32em;color:var(--olive);font-weight:500;text-transform:uppercase;}
.cover h1{font-family:'Cormorant Garamond',serif;font-size:46px;line-height:1.1;color:var(--navy);margin:12px 0 6px;}
.cover .ko-title{font-size:16px;font-weight:500;color:var(--ink);letter-spacing:.02em;}
.cover .meta{margin-top:14px;font-size:12px;color:var(--navy-soft);display:flex;gap:20px;justify-content:center;flex-wrap:wrap;letter-spacing:.04em;}

/* toolbar (screen only) */
.tools{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin:20px 0 6px;}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:8px 13px;background:#fff;}
.search svg{flex:none;}
.search input{border:0;outline:0;width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:transparent;font-weight:300;}
.btn{border:1px solid var(--line);background:#fff;color:var(--ink2);font-family:inherit;font-size:12.5px;font-weight:400;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.12s;white-space:nowrap;}
.btn:hover{border-color:var(--navy-soft);color:var(--navy);}
.btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.progress-wrap{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink2);width:100%;margin-top:4px;}
.bar{flex:1;height:5px;background:var(--line);border-radius:4px;overflow:hidden;}
.bar i{display:block;height:100%;width:0;background:var(--olive);transition:.25s;}

/* A-Z nav */
.aznav{display:flex;flex-wrap:wrap;gap:5px;margin:14px 0 6px;}
.aznav a{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:13px;color:var(--navy-soft);text-decoration:none;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;transition:.12s;}
.aznav a:hover{background:var(--navy);color:#fff;border-color:var(--navy);}

/* alphabet group */
.alpha{display:flex;align-items:baseline;gap:10px;margin:26px 0 8px;padding-bottom:5px;border-bottom:1.5px solid var(--navy);break-inside:avoid;break-after:avoid;}
.alpha .L{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--navy);line-height:1;}
.alpha .c{font-size:11px;color:var(--ink2);font-weight:300;}

/* entry */
.list{margin-top:4px;}
.entry{display:flex;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);break-inside:avoid;}
.entry .body{flex:1;min-width:0;}
.l1{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;}
.en{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:17px;color:var(--navy);letter-spacing:.01em;}
.ko{font-size:13px;color:var(--ink);font-weight:400;}
.sa{font-size:11.6px;line-height:1.5;margin-top:2px;}
.sa .lab{font-weight:500;display:inline-block;width:13px;}
.syn{color:#5d7a52;font-weight:300;}
.ant{color:var(--rose);font-weight:300;}
.syn .lab{color:var(--olive);} .ant .lab{color:var(--rose);}

/* checkbox */
.chk{width:15px;height:15px;border:1.4px solid var(--navy-soft);border-radius:4px;cursor:pointer;flex:none;margin-top:4px;position:relative;transition:.12s;}
.chk.checked{background:var(--olive);border-color:var(--olive);}
.chk.checked::after{content:"";position:absolute;left:4.4px;top:1px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);}
.entry.done .en,.entry.done .ko{opacity:.38;text-decoration:line-through;}

/* hide-meaning */
body.hideMode .ko,body.hideMode .sa{color:transparent!important;}
body.hideMode .ko,body.hideMode .syn,body.hideMode .ant{background:#f1ede6;border-radius:3px;cursor:pointer;}
body.hideMode .sa .lab{color:transparent!important;}
.reveal,.reveal .lab{color:inherit!important;background:transparent!important;}
.reveal .lab{color:inherit!important;}

.foot{text-align:center;margin-top:40px;font-size:11px;color:#b7b1a6;font-family:'Cormorant Garamond',serif;font-style:italic;letter-spacing:.04em;}
.hidden{display:none!important;}

@media (max-width:560px){
  .wrap{padding:22px 16px 60px;} .cover h1{font-size:36px;}
  .en{font-size:16px;}
}

/* ===== PRINT (A4, 2 columns) ===== */
@media print{
  @page{size:A4;margin:12mm 11mm;}
  body{background:#fff;}
  .wrap{max-width:none;padding:0;}
  .no-print{display:none!important;}
  body.hideMode .ko,body.hideMode .sa,body.hideMode .syn,body.hideMode .ant,body.hideMode .sa .lab{color:inherit!important;background:transparent!important;}
  .entry.done .en,.entry.done .ko{opacity:1;text-decoration:none;}
  .cover{padding:6px 0 16px;} .cover h1{font-size:40px;}
  .list{columns:2;column-gap:20px;}
  .alpha{column-span:all;margin:16px 0 6px;}
  .alpha:first-of-type{margin-top:10px;}
  .entry{padding:5px 0;break-inside:avoid;}
  .en{font-size:13.5px;} .ko{font-size:10.8px;} .sa{font-size:9.5px;}
  .foot{column-span:all;}
}
</style>

["underlying","a. 기저의, 근원적인, 잠재적인","inherent, fundamental, latent, implicit","superficial, explicit, apparent, obvious"],
["universal","a. 보편적인, 전 세계적인","global, widespread, common, pervasive","specific, particular, local, limited"],
["unnoticed","a. 눈에 띄지 않는, 간과된","unobserved, overlooked, unseen, hidden","noticed, observed, conspicuous, visible"],
["unquestioned","a. 의심받지 않는, 당연시되는","undisputed, unchallenged, accepted, acknowledged","questioned, debated, disputed, challenged"],
["unreliable","a. 신뢰할 수 없는, 믿을 수 없는","untrustworthy, undependable, dubious, inconsistent","reliable, trustworthy, dependable, consistent"],
["unstable","a. 불안정한, 변하기 쉬운","volatile, erratic, precarious, fluctuating","stable, steady, firm, consistent"],
["unsuitable","a. 부적합한, 부적절한","inappropriate, unfitting, improper, inadequate","suitable, appropriate, proper, fitting"],
["urban","a. 도시의","civic, metropolitan, municipal, city-related","rural, rustic, provincial, pastoral"],
["validity","n. 유효성, 타당성","legitimacy, soundness, justification, authenticity","invalidity, fallacy, illegitimacy, falsehood"],
["value","v. 소중히 여기다, 평가하다","cherish, appreciate, prize, esteem","disregard, despise, neglect, underestimate"],
["variation","n. 변화, 다양성, 차이","diversity, difference, divergence, fluctuation","uniformity, constancy, stability, sameness"],
["verified","a. 검증된, 확인된","confirmed, validated, authenticated, proven","unverified, unconfirmed, disputed, false"],
["verify","v. 확인하다, 검증하다","confirm, authenticate, validate, substantiate","dispute, falsify, disprove, contradict"],
["vital","a. 필수적인, 생명 유지에 필요한","essential, crucial, indispensable, critical","trivial, unimportant, negligible, peripheral"],
["wary","a. 조심하는, 경계하는","cautious, watchful, guarded, suspicious","unwary, trusting, careless, reckless"],
["widespread","a. 광범위한, 널리 퍼진","prevalent, extensive, pervasive, omnipresent","limited, confined, restricted, localized"]
];
const root=document.getElementById('root');
const STORE='vocab_dedup_v1';
let done=JSON.parse(localStorage.getItem(STORE)||'{}');
let total=DATA.length, letters=[];
let curL='';
DATA.forEach((w,i)=>{
  const L=w[0][0].toUpperCase();
  if(L!==curL){
    curL=L; letters.push(L);
    const cnt=DATA.filter(x=>x[0][0].toUpperCase()===L).length;
    const h=document.createElement('div');
    h.className='alpha'; h.id='L'+L;
    h.innerHTML='<span class="L">'+L+'</span><span class="c">'+cnt+' words</span>';
    root.appendChild(h);
  }
  const key='w'+i;
  const e=document.createElement('div');
  e.className='entry'+(done[key]?' done':'');
  e.dataset.s=(w[0]+' '+w[1]).toLowerCase();
  e.innerHTML=
    '<span class="chk no-print'+(done[key]?' checked':'')+'" data-k="'+key+'"></span>'+
    '<div class="body">'+
      '<div class="l1"><span class="en">'+w[0]+'</span><span class="ko">'+w[1]+'</span></div>'+
      '<div class="sa syn"><span class="lab">유</span>'+w[2]+'</div>'+
      '<div class="sa ant"><span class="lab">반</span>'+w[3]+'</div>'+
    '</div>';
  root.appendChild(e);
});

// A-Z nav
const az=document.getElementById('aznav');
letters.forEach(L=>{const a=document.createElement('a');a.href='#L'+L;a.textContent=L;az.appendChild(a);});

// progress
function upd(){
  const n=Object.values(done).filter(Boolean).length;
  document.getElementById('barFill').style.width=(n/total*100)+'%';
  document.getElementById('barTxt').textContent=n+' / '+total;
}
upd();

// checkbox
root.addEventListener('click',ev=>{
  const c=ev.target.closest('.chk'); if(!c)return;
  const k=c.dataset.k; done[k]=!done[k];
  c.classList.toggle('checked',done[k]);
  c.closest('.entry').classList.toggle('done',done[k]);
  localStorage.setItem(STORE,JSON.stringify(done)); upd();
});
document.getElementById('btnReset').addEventListener('click',()=>{
  if(!confirm('암기 체크를 모두 초기화할까요?'))return;
  done={}; localStorage.removeItem(STORE);
  document.querySelectorAll('.chk').forEach(c=>c.classList.remove('checked'));
  document.querySelectorAll('.entry').forEach(e=>e.classList.remove('done')); upd();
});

// hide-meaning
const bh=document.getElementById('btnHide');
bh.addEventListener('click',()=>{
  document.body.classList.toggle('hideMode');
  bh.classList.toggle('on');
  bh.textContent=document.body.classList.contains('hideMode')?'뜻 보이기':'뜻 가리기';
});
root.addEventListener('click',ev=>{
  if(!document.body.classList.contains('hideMode'))return;
  const cell=ev.target.closest('.ko,.sa'); if(!cell)return;
  cell.classList.toggle('reveal');
});

// search
document.getElementById('q').addEventListener('input',e=>{
  const v=e.target.value.trim().toLowerCase();
  document.querySelectorAll('.entry').forEach(en=>{
    en.classList.toggle('hidden', v && !en.dataset.s.includes(v));
  });
  // hide empty letter groups
  document.querySelectorAll('.alpha').forEach(a=>{
    let n=a.nextElementSibling, show=false;
    while(n && !n.classList.contains('alpha')){
      if(n.classList.contains('entry')&&!n.classList.contains('hidden')){show=true;break;}
      n=n.nextElementSibling;
    }
    a.classList.toggle('hidden', v && !show);
  });
});
document.getElementById('btnPrint').addEventListener('click',()=>window.print());
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
